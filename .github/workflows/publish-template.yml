name: Publish Template

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      template:
        description: 'Template name to publish (e.g. kiro, codex). Use "all" to publish every template.'
        required: false
        default: 'all'

jobs:
  determine-templates:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.list.outputs.templates }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: List templates to publish
        id: list
        env:
          REQUESTED: ${{ github.event.inputs.template }}
        run: |
          set -euo pipefail

          # 単一テンプレートの手動再配布
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${REQUESTED}" != "all" ]; then
            if [ ! -d "${REQUESTED}-template" ]; then
              echo "Template directory '${REQUESTED}-template' not found." >&2
              exit 1
            fi
            TEMPLATES=$(printf '%s\n' "${REQUESTED}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # リリース公開時 / dispatch(all): *-template/ を走査して全件配布する
            TEMPLATES=$(
              for dir in *-template/; do
                [ -d "${dir}" ] || continue
                basename "${dir}" | sed 's/-template$//'
              done | jq -R -s -c 'split("\n") | map(select(length > 0))'
            )
          fi

          if [ "${TEMPLATES}" = "[]" ]; then
            echo "No templates found to publish." >&2
            exit 1
          fi

          echo "Publishing templates: ${TEMPLATES}"
          echo "templates=${TEMPLATES}" >> "$GITHUB_OUTPUT"

  publish:
    needs: determine-templates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.determine-templates.outputs.templates) }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone output repo
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
        run: |
          OUTPUT_REPO="platform-harness-for-${{ matrix.template }}"
          git clone "https://x-access-token:${PUBLISH_PAT}@github.com/kanan4gh/${OUTPUT_REPO}.git" /tmp/output-repo

      - name: Copy template contents to output repo
        run: |
          SOURCE_DIR="${{ matrix.template }}-template"

          # Copy all contents including dotfiles/directories
          rsync -av --delete \
            --exclude='.git' \
            "${SOURCE_DIR}/" /tmp/output-repo/

      - name: Commit and push
        id: publish
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
        run: |
          OUTPUT_REPO="platform-harness-for-${{ matrix.template }}"

          cd /tmp/output-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "release" ]; then
            MSG="chore: publish ${{ github.ref_name }}"
          else
            MSG="chore: publish template (manual dispatch)"
          fi

          git commit -m "${MSG}"
          git push "https://x-access-token:${PUBLISH_PAT}@github.com/kanan4gh/${OUTPUT_REPO}.git" main
          echo "published=true" >> $GITHUB_OUTPUT

      - name: Create release on output repo
        if: github.event_name == 'release'
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
        run: |
          OUTPUT_REPO="platform-harness-for-${{ matrix.template }}"

          # 再実行時に同一タグのリリースが既にある場合はスキップする
          if GH_TOKEN="${PUBLISH_PAT}" gh release view "${{ github.ref_name }}" --repo "kanan4gh/${OUTPUT_REPO}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists on ${OUTPUT_REPO}. Skipping."
            exit 0
          fi

          RELEASE_NOTES=$(printf "platform-harness-engineering ${{ github.ref_name }} に対応したテンプレートです。\n\n詳細なリリースノートは https://github.com/kanan4gh/platform-harness-engineering/releases/tag/${{ github.ref_name }} を参照してください。")

          GH_TOKEN="${PUBLISH_PAT}" gh release create "${{ github.ref_name }}" \
            --repo "kanan4gh/${OUTPUT_REPO}" \
            --title "${{ github.event.release.name }}" \
            --notes "${RELEASE_NOTES}"
