name: Publish Template

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      template:
        description: 'Template name to publish (e.g. kiro, codex). Use "all" to publish every template.'
        required: false
        default: 'all'

jobs:
  determine-templates:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.list.outputs.templates }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: List templates to publish
        id: list
        env:
          REQUESTED: ${{ github.event.inputs.template }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # 単一テンプレートの手動再配布
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${REQUESTED}" != "all" ]; then
            if [ ! -d "${REQUESTED}-template" ]; then
              echo "Template directory '${REQUESTED}-template' not found." >&2
              exit 1
            fi
            TEMPLATES=$(jq -n -c --arg t "${REQUESTED}" '[$t]')
          else
            # リリース公開時 / dispatch(all): *-template/ を走査して全件配布する
            TEMPLATES=$(
              for dir in *-template/; do
                [ -d "${dir}" ] || continue
                basename "${dir}" | sed 's/-template$//'
              done | jq -R -s -c 'split("\n") | map(select(length > 0))'
            )
          fi

          if [ "${TEMPLATES}" = "[]" ]; then
            echo "No templates found to publish." >&2
            exit 1
          fi

          echo "Publishing templates: ${TEMPLATES}"
          echo "templates=${TEMPLATES}" >> "$GITHUB_OUTPUT"

  publish:
    needs: determine-templates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.determine-templates.outputs.templates) }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone output repo
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
          TEMPLATE: ${{ matrix.template }}
        run: |
          OUTPUT_REPO="platform-harness-for-${TEMPLATE}"
          git clone "https://x-access-token:${PUBLISH_PAT}@github.com/kanan4gh/${OUTPUT_REPO}.git" /tmp/output-repo

      - name: Copy template contents to output repo
        env:
          TEMPLATE: ${{ matrix.template }}
        run: |
          SOURCE_DIR="${TEMPLATE}-template"

          # Copy all contents including dotfiles/directories
          rsync -av --delete \
            --exclude='.git' \
            "${SOURCE_DIR}/" /tmp/output-repo/

      - name: Commit and push
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
          TEMPLATE: ${{ matrix.template }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          OUTPUT_REPO="platform-harness-for-${TEMPLATE}"

          cd /tmp/output-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          if [ "${EVENT_NAME}" = "release" ]; then
            MSG="chore: publish ${REF_NAME}"
          else
            MSG="chore: publish template (manual dispatch)"
          fi

          git commit -m "${MSG}"
          git push "https://x-access-token:${PUBLISH_PAT}@github.com/kanan4gh/${OUTPUT_REPO}.git" main

      - name: Create release on output repo
        if: github.event_name == 'release'
        env:
          PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
          TEMPLATE: ${{ matrix.template }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TITLE: ${{ github.event.release.name }}
        run: |
          OUTPUT_REPO="platform-harness-for-${TEMPLATE}"
          export GH_TOKEN="${PUBLISH_PAT}"

          # 再実行時に同一タグのリリースが既にある場合はスキップする
          if gh release view "${REF_NAME}" --repo "kanan4gh/${OUTPUT_REPO}" >/dev/null 2>&1; then
            echo "Release ${REF_NAME} already exists on ${OUTPUT_REPO}. Skipping."
            exit 0
          fi

          RELEASE_NOTES=$(printf "platform-harness-engineering %s に対応したテンプレートです。\n\n詳細なリリースノートは https://github.com/kanan4gh/platform-harness-engineering/releases/tag/%s を参照してください。" "${REF_NAME}" "${REF_NAME}")

          gh release create "${REF_NAME}" \
            --repo "kanan4gh/${OUTPUT_REPO}" \
            --title "${RELEASE_TITLE}" \
            --notes "${RELEASE_NOTES}"
